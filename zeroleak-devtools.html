<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZeroLeak DevTools</title>
<style>
/* =====================================================================
   ZeroLeak DevTools – Style Sheet
   Aesthetic: Industrial / Terminal — dark, dense, precise
   ===================================================================== */



/* ── Variables ─────────────────────────────────────────────────────────── */
:root {
  --bg-0: #0a0c0f;
  --bg-1: #10141a;
  --bg-2: #161c24;
  --bg-3: #1e2530;

  --border: #252d3a;
  --border-hi: #2e3d52;

  --text-primary:   #e2e8f0;
  --text-secondary: #8899aa;
  --text-muted:     #4a5568;

  --accent:         #00d4ff;
  --accent-dim:     rgba(0, 212, 255, 0.12);
  --accent-glow:    rgba(0, 212, 255, 0.06);

  --success:        #00e676;
  --success-dim:    rgba(0, 230, 118, 0.08);
  --error:          #ff4d6a;
  --error-dim:      rgba(255, 77, 106, 0.08);
  --warning:        #ffb74d;

  --sidebar-w:      220px;

  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;

  --radius: 3px;
  --transition: 150ms ease;
}

/* ── Light Mode ─────────────────────────────────────────────────────────── */
.light-mode {
  --bg-0: #ffffff;
  --bg-1: #f8f9fa;
  --bg-2: #e9ecef;
  --bg-3: #dee2e6;

  --border: #ced4da;
  --border-hi: #adb5bd;

  --text-primary:   #212529;
  --text-secondary: #6c757d;
  --text-muted:     #495057;

  --accent:         #007bff;
  --accent-dim:     rgba(0, 123, 255, 0.12);
  --accent-glow:    rgba(0, 123, 255, 0.06);

  --success:        #28a745;
  --success-dim:    rgba(40, 167, 69, 0.08);
  --error:          #dc3545;
  --error-dim:      rgba(220, 53, 69, 0.08);
  --warning:        #ffc107;
}

/* ── Reset ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-0);
  color: var(--text-primary);
  font-family: var(--sans);
  font-size: 20px;
  line-height: 1.5;
  overflow: hidden;
}

button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
textarea { resize: none; font: inherit; }
[hidden] { display: none !important; }

/* ── App Shell ──────────────────────────────────────────────────────────── */
#app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  grid-template-columns: var(--sidebar-w) 1fr 1fr;
  grid-template-areas:
    "topbar  topbar  topbar"
    "sidebar input   output"
    "footer  footer  footer";
  height: 100vh;
  overflow: hidden;
}

/* ── Top Bar ────────────────────────────────────────────────────────────── */
#topbar {
  grid-area: topbar;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 48px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-right: 12px;
}

.brand-icon {
  width: 20px;
  height: 20px;
  background: var(--accent);
  clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
  flex-shrink: 0;
}

.brand-name {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.04em;
}

.brand-name span {
  color: var(--accent);
}

#tool-title {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  padding: 3px 8px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.topbar-spacer { flex: 1; }

#sensitive-timer {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--warning);
  letter-spacing: 0.04em;
  animation: pulse-warn 1s ease-in-out infinite;
}

@keyframes pulse-warn {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.55; }
}

#btn-sensitive {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: var(--bg-2);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: var(--transition);
}

#btn-sensitive .sm-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: var(--transition);
}

#btn-sensitive.active {
  border-color: var(--accent);
  color: var(--accent);
}

#btn-sensitive.active .sm-dot {
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

#btn-sensitive:hover { border-color: var(--accent); }

#btn-clear {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-secondary);
  transition: var(--transition);
}

#btn-clear:hover {
  border-color: var(--error);
  color: var(--error);
}

#btn-theme {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-secondary);
  transition: var(--transition);
}

#btn-theme:hover {
  border-color: var(--accent);
}

/* ── Sidebar ────────────────────────────────────────────────────────────── */
#sidebar-nav {
  grid-area: sidebar;
  background: var(--bg-1);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}

.sidebar-group {
  padding: 8px 14px 4px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.sidebar-item {
  display: block;
  width: 100%;
  padding: 7px 14px;
  text-align: left;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 400;
  color: var(--text-secondary);
  border-left: 2px solid transparent;
  transition: var(--transition);
}

.sidebar-item:hover {
  background: var(--bg-2);
  color: var(--text-primary);
}

.sidebar-item.active {
  background: var(--accent-dim);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 500;
}

/* ── Input Panel ────────────────────────────────────────────────────────── */
#input-panel {
  grid-area: input;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--bg-0);
  overflow: hidden;
  min-height: 0;
}

.panel-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 14px;
  height: 38px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.panel-spacer { flex: 1; }

#btn-run {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  background: var(--accent);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--bg-0);
  letter-spacing: 0.04em;
  transition: var(--transition);
}

#btn-run:hover {
  background: #33ddff;
  box-shadow: 0 0 12px var(--accent-dim);
}

#btn-run:active { transform: scale(0.97); }

#btn-copy {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-secondary);
  transition: var(--transition);
}

#btn-copy:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.run-shortcut {
  font-weight: 400;
  opacity: 0.6;
  font-size: 10px;
}

/* ── Editor containers (input + output share this pattern) ──────────────── */

/* The container scrolls; gutter and content move together inside it */
.editor-container {
  flex: 1;
  min-height: 0;
  display: flex;
  overflow: hidden;
  position: relative;
}

.editor-gutter {
  flex-shrink: 0;
  width: 42px;
  padding: 16px 0;
  background: var(--bg-1);
  border-right: 1px solid var(--border);
  text-align: right;
  user-select: none;
  pointer-events: none;
  overflow-y: scroll;     /* scrollable but invisible — synced via JS scrollTop */
  scrollbar-width: none;  /* Firefox: hide scrollbar */
}

.editor-gutter::-webkit-scrollbar {
  display: none;          /* Chrome/Safari: hide scrollbar */
}

.editor-gutter span {
  display: block;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.65;
  padding-right: 8px;
  color: var(--text-muted);
}

.editor-gutter span.line-error {
  color: var(--error);
  background: var(--error-dim);
  font-weight: 700;
}

#input-area {
  flex: 1;
  min-height: 0;
  padding: 16px 16px 16px 10px;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.65;
  caret-color: var(--accent);
  overflow-y: scroll;   /* always show scrollbar to avoid width jump */
  overflow-x: auto;
  resize: none;
  white-space: pre;
  tab-size: 2;
}

#input-area::placeholder {
  color: var(--text-muted);
  font-style: normal;
}

#input-area[data-sensitive-cleared] {
  animation: flash-cleared 2s ease forwards;
}

@keyframes flash-cleared {
  0%   { background: rgba(255, 77, 106, 0.12); }
  100% { background: transparent; }
}

/* ── Output Panel ───────────────────────────────────────────────────────── */
#output-panel {
  grid-area: output;
  display: flex;
  flex-direction: column;
  background: var(--bg-0);
  overflow: hidden;
  min-height: 0;
}

#output-stats {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

#output-stats span {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  background: var(--bg-2);
  padding: 1px 6px;
  border-radius: var(--radius);
}

#mode-hint {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 2px 8px;
  border-radius: var(--radius);
  letter-spacing: 0.06em;
}

.output-scroll {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* editor-container inside output must grow to fill output-scroll */
#output-editor-container {
  flex: 1;
  min-height: 0;
}

/* <pre> scrolls on its own; gutter syncs scrollTop to it */
#output-area {
  flex: 1;
  min-width: 0;
  min-height: 0;
  padding: 16px 16px 16px 10px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.65;
  white-space: pre;
  word-break: normal;
  overflow-y: scroll;
  overflow-x: auto;
  scrollbar-width: none;
  background: transparent;
  margin: 0;
  color: var(--text-primary);
}

#output-area::-webkit-scrollbar { display: none; }

#output-area.success { color: var(--text-primary); }

#output-area.error {
  color: var(--error);
  white-space: pre-wrap;
  word-break: break-word;
}

#output-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  height: 100%;
  gap: 8px;
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 11px;
  user-select: none;
}

.empty-icon {
  font-size: 28px;
  opacity: 0.3;
}

/* ── Footer ─────────────────────────────────────────────────────────────── */
#footer {
  grid-area: footer;
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 0 16px;
  height: 30px;
  background: var(--bg-1);
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
}

.footer-check {
  display: flex;
  align-items: center;
  gap: 5px;
  color: var(--success);
}

.footer-check::before {
  content: "✔";
  font-size: 9px;
}

/* ── Diff Output ──────────────────────────────────────────────────────────── */
.diff-add { color: var(--success); display: block; background: var(--success-dim); }
.diff-rem { color: var(--error);   display: block; background: var(--error-dim); }
.diff-eq  { color: var(--text-secondary); display: block; }

.stat-add { color: var(--success) !important; background: var(--success-dim) !important; }
.stat-rem { color: var(--error)   !important; background: var(--error-dim)   !important; }

/* ── JWT Status Hint ──────────────────────────────────────────────────────── */
#mode-hint.mode-hint-error {
  color: var(--error);
  background: var(--error-dim);
}
#mode-hint.mode-hint-ok {
  color: var(--success);
  background: var(--success-dim);
}

/* ── Scrollbar ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Responsive (narrow screens) ────────────────────────────────────────── */
@media (max-width: 900px) {
  :root { --sidebar-w: 160px; }

  #app {
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: auto 1fr 1fr auto;
    grid-template-areas:
      "topbar  topbar"
      "sidebar input"
      "sidebar output"
      "footer  footer";
  }
}

@media (max-width: 600px) {
  #app {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto 1fr 1fr auto;
    grid-template-areas:
      "topbar"
      "sidebar"
      "input"
      "output"
      "footer";
    overflow-y: auto;
    height: auto;
    min-height: 100vh;
  }

  #sidebar-nav { overflow-y: visible; display: flex; flex-direction: row; flex-wrap: wrap; }
  .sidebar-group { display: none; }
  .sidebar-item { width: auto; padding: 6px 10px; }

  #input-area { min-height: 150px; }
}

/* Fallback fonts when offline */
:root {
  --mono: 'Courier New', Courier, monospace;
  --sans: system-ui, -apple-system, sans-serif;
}
@media (min-width: 1px) {
  /* Overridden by Google Fonts if online */
}
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="topbar-brand">
      <div class="brand-icon"></div>
      <span class="brand-name">Zero<span>Leak</span></span>
    </div>
    <span id="tool-title">—</span>
    <div class="topbar-spacer"></div>
    <span id="sensitive-timer" hidden></span>
    <button id="btn-sensitive" class="active">
      <span class="sm-dot"></span>
      <span class="sm-label">Sensitive Mode: ON</span>
    </button>
    <button id="btn-clear">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Clear
    </button>
    <button id="btn-theme">Light Mode</button>
  </header>
  <nav id="sidebar-nav" aria-label="Tool list"></nav>
  <section id="input-panel">
    <div class="panel-header">
      <span class="panel-label">Input</span>
      <div class="panel-spacer"></div>
      <button id="btn-run">Run <span class="run-shortcut">⌃↵</span></button>
    </div>
    <div class="editor-container">
      <div class="editor-gutter" id="input-gutter"><span>1</span></div>
      <textarea id="input-area" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
  </section>
  <section id="output-panel">
    <div class="panel-header">
      <span class="panel-label">Output</span>
      <div class="panel-spacer"></div>
      <div id="output-stats" hidden></div>
      <span id="mode-hint" hidden></span>
      <button id="btn-copy">Copy</button>
    </div>
    <div class="output-scroll">
      <div id="output-empty"><span class="empty-icon">⬡</span><span>Run a tool to see output</span></div>
      <div class="editor-container" id="output-editor-container" hidden>
        <div class="editor-gutter" id="output-gutter"><span>1</span></div>
        <pre id="output-area"></pre>
      </div>
    </div>
  </section>
  <footer id="footer">
    <span class="footer-check">Running locally</span>
    <span class="footer-check">No data leaves your machine</span>
    <span class="footer-check">No network calls</span>
    <span class="footer-check">No storage</span>
  </footer>
</div>
<script>
/**
 * ZeroLeak DevTools – Sensitive Mode Core
 *
 * Handles auto-clear timers, manual clears, and tool-switch wiping.
 * ZERO storage interaction. All state lives in-memory only.
 */

class SensitiveMode {
  /**
   * @param {object} options
   * @param {number}   options.timeoutMs   – auto-clear delay in ms (default 30s)
   * @param {Function} options.onClear     – callback fired when data is cleared
   * @param {Function} options.onTick      – callback fired every second with secondsLeft (or null)
   */
  constructor({ timeoutMs = 30_000, onClear = () => {}, onTick = () => {} } = {}) {
    this._timeoutMs = timeoutMs;
    this._onClear = onClear;
    this._onTick = onTick;
    this._clearTimer = null;
    this._tickTimer = null;
    this._startedAt = null;
    this._enabled = true;
  }

  get enabled() {
    return this._enabled;
  }

  /** Call whenever the user types / pastes into input */
  activity() {
    if (!this._enabled) return;
    this._reset();
    this._startCountdown();
  }

  /** Manual "Clear All" */
  clearNow() {
    this._cancelTimers();
    this._startedAt = null;
    this._onTick(null);
    this._onClear();
  }

  /** Call on tool switch – always clears regardless of mode */
  onToolSwitch() {
    this._cancelTimers();
    this._startedAt = null;
    this._onTick(null);
    this._onClear();
  }

  toggle() {
    this._enabled = !this._enabled;
    if (!this._enabled) {
      this._cancelTimers();
      this._onTick(null);
    }
    return this._enabled;
  }

  setTimeout(ms) {
    this._timeoutMs = ms;
    if (this._startedAt !== null) {
      this._reset();
      this._startCountdown();
    }
  }

  /* ── Private ───────────────────────────────────────────────────────────── */

  _startCountdown() {
    this._startedAt = Date.now();

    this._clearTimer = setTimeout(() => {
      this._cancelTimers();
      this._startedAt = null;
      this._onTick(null);
      this._onClear();
    }, this._timeoutMs);

    this._tickTimer = setInterval(() => {
      if (this._startedAt === null) { this._cancelTimers(); return; }
      const elapsed = Date.now() - this._startedAt;
      const left = Math.max(0, Math.ceil((this._timeoutMs - elapsed) / 1_000));
      this._onTick(left);
      if (left <= 0) this._cancelTimers();
    }, 1_000);

    // Fire immediately so UI doesn't wait 1s
    const secondsLeft = Math.ceil(this._timeoutMs / 1_000);
    this._onTick(secondsLeft);
  }

  _reset() {
    this._cancelTimers();
    this._startedAt = null;
  }

  _cancelTimers() {
    if (this._clearTimer) { clearTimeout(this._clearTimer);  this._clearTimer = null; }
    if (this._tickTimer)  { clearInterval(this._tickTimer); this._tickTimer = null; }
  }
}


// === TOOL: base64 ===
var TOOL_base64 = (function() {
/**
 * ZeroLeak DevTools – Base64 Tool
 * Encode and decode Base64 strings entirely in-browser.
 * NO network calls. NO storage. Pure browser crypto/text APIs.
 */

const meta = {
  id: "base64",
  label: "Base64 Encode / Decode",
  phase: 1,
  group: "Encoding",
  placeholder: "Paste text to encode, or a Base64 string to decode…",
  description: "Encode plain text to Base64 or decode Base64 back to text.",
};

/**
 * Auto-detects whether input looks like Base64 and runs the right operation.
 * Falls back to encode if detection is ambiguous.
 *
 * @param {string} input
 * @param {"encode"|"decode"|"auto"} mode
 * @returns {{ success: boolean, output: string, error: string, mode: string }}
 */
function run(input, mode = "auto") {
  if (typeof input !== "string") {
    return { success: false, output: "", error: "Input must be a string.", mode };
  }

  const trimmed = input.trim();
  if (trimmed === "") {
    return { success: false, output: "", error: "Input is empty.", mode };
  }

  const detectedMode =
    mode !== "auto"
      ? mode
      : isBase64(trimmed)
      ? "decode"
      : "encode";

  try {
    if (detectedMode === "encode") {
      // TextEncoder handles full Unicode
      const bytes = new TextEncoder().encode(trimmed);
      const binary = Array.from(bytes, (b) => String.fromCharCode(b)).join("");
      const output = btoa(binary);
      return { success: true, output, error: "", mode: "encode" };
    } else {
      // Decode: handle URL-safe Base64 variants
      const normalized = trimmed.replace(/-/g, "+").replace(/_/g, "/");
      const padded = normalized.padEnd(
        normalized.length + ((4 - (normalized.length % 4)) % 4),
        "="
      );
      const binary = atob(padded);
      const bytes = Uint8Array.from(binary, (c) => c.charCodeAt(0));
      const output = new TextDecoder("utf-8", { fatal: true }).decode(bytes);
      return { success: true, output, error: "", mode: "decode" };
    }
  } catch (e) {
    return {

      const levelMap = keyStack.get(indent);
      if (levelMap.has(key)) {

          severity: "error",
          message: `Duplicate key "${key}" at indentation level ${indent}.`,

        for (const k of keyStack.keys()) {

    if (indent > 0 && indent % 2 !== 0) {
      issues.push({
        line: lineNum,
        severity: "warning",
        message: `Odd indentation (${indent} spaces) — YAML conventionally uses multiples of 2.`,
      });

    if (/^[^"'#]+:[^\s\/\/]/.test(content) && !/^https?:/.test(content) && !content.startsWith("-")) {

        line: lineNum,
        severity: "error",
        message: `Missing space after colon — use "key: value" not "key:value".`,

    }

    `Keys:       ${keys}`,
    `List items: ${listItems}`,

function serializeNode(node, depth, indentSize) {

  const childPad = " ".repeat((depth + 1) * indentSize);

  if (node.nodeType === Node.TEXT_NODE) {
    const text = node.textContent.trim();
    return text ? `${pad}${escapeXml(text)}` : "";

  if (node.nodeType === Node.COMMENT_NODE) {
    return `${pad}<!--${node.textContent}-->`;
  }

  if (node.nodeType !== Node.ELEMENT_NODE) return "";

  const tag = node.tagName;
  const attrs = Array.from(node.attributes)
    .map((a) => ` ${a.name}="${escapeXml(a.value)}"`)
    .join("");

  const children = Array.from(node.childNodes)
    .map((c) => serializeNode(c, depth + 1, indentSize))
    .filter((s) => s !== "");

  if (children.length === 0) {
    return `${pad}<${tag}${attrs} />`;
  }

  // Single text child → inline
  if (children.length === 1 && node.childNodes[0]?.nodeType === Node.TEXT_NODE) {
    const text = node.childNodes[0].textContent.trim();
    if (text.length < 80) {
      return `${pad}<${tag}${attrs}>${escapeXml(text)}</${tag}>`;

  return `${pad}<${tag}${attrs}>\n${children.join("\n")}\n${pad}</${tag}>`;

    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&apos;");

/* ── Myers Diff ───────────────────────────────────────────────────────── */

/**
 * Myers O(ND) diff algorithm.
 * Returns an array of { type: "equal"|"add"|"remove", value: string }
 */
function myersDiff(a, b) {
  const n = a.length;
  const m = b.length;

  if (n === 0 && m === 0) return [];
  if (n === 0) return b.map((v) => ({ type: "add", value: v }));
  if (m === 0) return a.map((v) => ({ type: "remove", value: v }));

  const max = n + m;
  const offset = max;
  const v = new Array(2 * max + 1).fill(0);
  const trace = [];

  outer: for (let d = 0; d <= max; d++) {
    trace.push(v.slice());
    for (let k = -d; k <= d; k += 2) {
      let x;
      if (k === -d || (k !== d && v[k - 1 + offset] < v[k + 1 + offset])) {
        x = v[k + 1 + offset];
      } else {
        x = v[k - 1 + offset] + 1;
      }
      let y = x - k;
      while (x < n && y < m && a[x] === b[y]) { x++; y++; }
      v[k + offset] = x;
      if (x >= n && y >= m) break outer;
    }
  }

  // Backtrack
  const edits = [];
  let x = n, y = m;

  for (let d = trace.length - 1; d >= 0; d--) {
    const vSnap = trace[d];
    const k = x - y;
    let prevK;
    if (k === -d || (k !== d && vSnap[k - 1 + offset] < vSnap[k + 1 + offset])) {
      prevK = k + 1;
    } else {
      prevK = k - 1;
    }
    const prevX = vSnap[prevK + offset];
    const prevY = prevX - prevK;

    // Diagonal (equal) moves
    while (x > prevX && y > prevY) {
      x--; y--;
      edits.unshift({ type: "equal", value: a[x] });
    }

    if (d > 0) {
      if (prevK === k + 1) {
        // came from k+1 → inserted row (add from b)
        edits.unshift({ type: "add", value: b[prevY] });
      } else {
        // came from k-1 → deleted column (remove from a)
        edits.unshift({ type: "remove", value: a[prevX] });
      }
    }

    x = prevX; y = prevY;
  }

  return edits;
}

  let lineA = 1, lineB = 1;

      lineA++;
    } else if (type === "add") {
      out.push(`+      ${String(lineB).padStart(3)} | ${value}`);
      lineB++;
    } else {
      out.push(`  ${String(lineA).padStart(3)} ${String(lineB).padStart(3)} | ${value}`);
      lineA++;
      lineB++;
    }
  });

  return ["  OLD  NEW | Content", "  ─── ─── ┼─────────────────────────────────", ...out].join("\n");

    fieldMatches.forEach((f) => {
      if (f.includes("_") && !f.startsWith("_")) {
        issues.push({ severity: "warning", message: `Field "${f}" uses underscores. GraphQL conventionally uses camelCase.` });
      }
    });
  }

  return issues;
}

/* ── Report ──────────────────────────────────────────────────────────────── */

function buildReport(info, src, issues = []) {
  const lines = [
    "✔  Query is syntactically valid",
    "",
  ];

  if (issues.length > 0) {
    const warnings = issues.filter((i) => i.severity === "warning");
    if (warnings.length > 0) {
      lines.push("── LINTING WARNINGS ─────────────────────────────────");
      warnings.forEach((w) => lines.push(`  ⚠  ${w.message}`));
      lines.push("");
    }
  }

  lines.push("── OPERATIONS ─────────────────────────────────────");

  if (info.operations.length === 0) {
    lines.push("  (none — anonymous or fragment-only document)");
  } else {
    info.operations.forEach((op, i) => {
      lines.push(`  ${i + 1}. ${op.type}${op.name ? " " + op.name : " (anonymous)"}`);
      if (op.variables > 0) lines.push(`     Variables: ${op.variables}`);
      if (op.directives > 0) lines.push(`     Directives: ${op.directives}`);
    });
  }

  if (info.fragments.length > 0) {
    lines.push("", "── FRAGMENTS ──────────────────────────────────────");
    info.fragments.forEach((f) => {
      if (f.name) lines.push(`  definition: ${f.name} on ${f.on}`);
      else         lines.push(`  spread: ...${f.spread}`);
    });
  }

  if (info.variables.length > 0) {
    lines.push("", "── VARIABLES ──────────────────────────────────────");
    info.variables.forEach((v) => {
      lines.push(`  $${v.name}: ${v.type}${v.default !== null ? ` = ${v.default}` : ""}`);
    });
  }

  lines.push("", "── METRICS ────────────────────────────────────────");
  lines.push(`  Fields selected:   ${info.fieldCount}`);
  lines.push(`  Source length:     ${src.length} chars`);
  lines.push(`  Lines:             ${src.split("\n").length}`);

  return lines.join("\n");
}

  return { meta: meta, run: run };
})();

var TOOL_cron = (function() {
/**
 * ZeroLeak DevTools – Cron Expression Parser
 *
 * Parses standard 5-field cron expressions and extended 6-field (with seconds).
 * Shows human-readable description and next 5 scheduled run times.
 * NO external libraries. NO network calls.
 *
 * Format: [second] minute hour day-of-month month day-of-week
 *
 * Supports:
 *   - * (wildcard)
 *   - , (list)
 *   - - (range)
 *   - / (step)
 *   - Named months (JAN-DEC) and weekdays (SUN-SAT)
 *   - @shortcuts: @yearly @annually @monthly @weekly @daily @midnight @hourly @reboot
 */

const meta = {
  id: "cron",
  label: "Cron Expression Parser",
  phase: 3,
  group: "Time",
  placeholder: `Enter a cron expression…

Examples:
  0 9 * * 1-5       → 9am every weekday
  */15 * * * *      → every 15 minutes
  0 0 1 * *         → midnight on 1st of each month
  @daily            → once a day at midnight`,
  description: "Parse cron expressions into human-readable descriptions with next run times.",
};

const SHORTCUTS = {
  "@yearly":    "0 0 1 1 *",
  "@annually":  "0 0 1 1 *",
  "@monthly":   "0 0 1 * *",
  "@weekly":    "0 0 * * 0",
  "@daily":     "0 0 * * *",
  "@midnight":  "0 0 * * *",
  "@hourly":    "0 * * * *",
};

const MONTHS   = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const WEEKDAYS = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

/**
 * @param {string} input
 * @returns {{ success: boolean, output: string, error: string, schedule: object|null }}
 */
function run(input) {
  if (typeof input !== "string") {
    return { success: false, output: "", error: "Input must be a string.", schedule: null };
  }

  const raw = input.trim();
  if (raw === "") {
    return { success: false, output: "", error: "Input is empty.", schedule: null };
  }

  if (raw === "@reboot") {
    return {
      success: true,
      output: "Description: Run once at system startup (@reboot)\n\nNext runs: Cannot be predicted — runs on system boot.",
      error: "",
      schedule: { description: "@reboot" },
    };
  }

  // Resolve shortcuts
  const expr = SHORTCUTS[raw.toLowerCase()] ?? raw;

  try {
    const fields = parseExpression(expr);
    const description = describe(fields);
    const nextRuns = computeNextRuns(fields, new Date(), 5);

    const output = [
      `Expression:    ${raw}${SHORTCUTS[raw.toLowerCase()] ? ` → ${expr}` : ""}`,
      ``,
      `Description:   ${description}`,
      ``,
      `── NEXT 5 RUNS (UTC) ──────────────────────────────`,
      ...nextRuns.map((d, i) => `  ${i + 1}.  ${d.toUTCString()}`),
      ``,
      `── FIELD BREAKDOWN ────────────────────────────────`,
      `  Minute:       ${raw === expr ? fields.minute.raw : "0"}`,
      `  Hour:         ${fields.hour.raw}`,
      `  Day of month: ${fields.dom.raw}`,
      `  Month:        ${fields.month.raw}`,
      `  Day of week:  ${fields.dow.raw}`,
    ].join("\n");

    return { success: true, output, error: "", schedule: { description, nextRuns } };
  } catch (e) {
    return { success: false, output: "", error: e.message, schedule: null };
  }
}

/* ── Parsing ─────────────────────────────────────────────────────────────── */

function parseExpression(expr) {
  const parts = expr.trim().split(/\s+/);

  // Support 6-field (with leading seconds field) — drop seconds for now
  if (parts.length === 6) parts.shift();

  if (parts.length !== 5) {
    throw new Error(
      `Expected 5 fields (minute hour day month weekday), got ${parts.length}.\n` +
      `Example: "0 9 * * 1-5"`
    );
  }

  const [minute, hour, dom, month, dow] = parts;

  return {
    minute: parseField(minute, 0, 59, null),
    hour:   parseField(hour,   0, 23, null),
    dom:    parseField(dom,    1, 31, null),
    month:  parseField(month,  1, 12, MONTHS),
    dow:    parseField(dow,    0,  6, WEEKDAYS),
  };
}

function parseField(raw, min, max, names) {
  const normalised = names
    ? raw.toUpperCase().replace(
        new RegExp(names.join("|"), "g"),
        (m) => String(names.indexOf(m) + (min === 0 ? 0 : 1))
      )
    : raw;

  if (normalised === "*") {
    return { raw, type: "any", values: range(min, max) };
  }

  const values = new Set();

  for (const part of normalised.split(",")) {
    if (part.includes("/")) {
      const [rangeStr, stepStr] = part.split("/");
      const step = parseInt(stepStr, 10);
      if (isNaN(step) || step < 1) throw new Error(`Invalid step value in "${raw}"`);
      const [rStart, rEnd] = rangeStr === "*" ? [min, max] : rangeStr.split("-").map(Number);
      if (isNaN(rStart) || isNaN(rEnd) || rStart < min || rEnd > max) {
        throw new Error(`Range out of bounds in "${raw}" (${min}–${max})`);
      }
      for (let v = rStart; v <= rEnd; v += step) values.add(v);
    } else if (part.includes("-")) {
      const [lo, hi] = part.split("-").map(Number);
      if (isNaN(lo) || isNaN(hi) || lo < min || hi > max || lo > hi) {
        throw new Error(`Invalid range "${part}" in field "${raw}" (${min}–${max})`);
      }
      for (let v = lo; v <= hi; v++) values.add(v);
    } else {
      const v = parseInt(part, 10);
      if (isNaN(v) || v < min || v > max) {
        throw new Error(`Value ${part} out of range (${min}–${max}) in "${raw}"`);
      }
      values.add(v);
    }
  }

  return { raw, type: "specific", values: [...values].sort((a, b) => a - b) };
}

function range(a, b) {
  const r = [];
  for (let i = a; i <= b; i++) r.push(i);
  return r;
}

/* ── Human-readable description ─────────────────────────────────────────── */

function describe({ minute, hour, dom, month, dow }) {
  const parts = [];

  // Minutes
  if (minute.type === "any") parts.push("every minute");
  else if (minute.values.length === 1 && minute.values[0] === 0) { /* silent */ }
  else parts.push(`at minute${minute.values.length > 1 ? "s" : ""} ${minute.values.join(", ")}`);

  // Hours
  if (hour.type === "any") parts.push("of every hour");
  else {
    const fmt = (h) => `${h % 12 || 12}${h < 12 ? "am" : "pm"}`;
    parts.push(`at ${hour.values.map(fmt).join(", ")}`);
  }

  // Day of month
  if (dom.type !== "any") {
    const ordinal = (n) => n + (["th","st","nd","rd"][((n % 100 - 20 < 0 ? n % 100 : n % 10))] ?? "th");
    parts.push(`on the ${dom.values.map(ordinal).join(", ")}`);
  }

  // Month
  if (month.type !== "any") {
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    parts.push(`in ${month.values.map((m) => monthNames[m - 1]).join(", ")}`);
  }

  // Day of week
  if (dow.type !== "any") {
    const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    parts.push(`on ${dow.values.map((d) => dayNames[d]).join(", ")}`);
  }

  return parts.length ? capitalise(parts.join(", ")) : "Every minute";
}

function capitalise(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

/* ── Next run computation ────────────────────────────────────────────────── */

function computeNextRuns(fields, from, count) {
  const results = [];
  // Start from the next minute
  const cursor = new Date(from);
  cursor.setUTCSeconds(0, 0);
  cursor.setUTCMinutes(cursor.getUTCMinutes() + 1);

  const maxIterations = 527_040; // one year in minutes
  let iterations = 0;

  while (results.length < count && iterations++ < maxIterations) {
    const m  = cursor.getUTCMinutes();
    const h  = cursor.getUTCHours();
    const dm = cursor.getUTCDate();
    const mo = cursor.getUTCMonth() + 1;
    const dw = cursor.getUTCDay();

    if (
      fields.minute.values.includes(m) &&
      fields.hour.values.includes(h) &&
      fields.dom.values.includes(dm) &&
      fields.month.values.includes(mo) &&
      fields.dow.values.includes(dw)
    ) {
      results.push(new Date(cursor));
    }

    cursor.setUTCMinutes(cursor.getUTCMinutes() + 1);
  }

  if (results.length < count) {
    results.push(new Error("Could not find enough matches within one year"));
  }

  return results.filter((r) => r instanceof Date);
}

  return { meta: meta, run: run };
})();

var TOOL_regex = (function() {
/**
 * ZeroLeak DevTools – Regex Tester
 *
 * Tests a regular expression against input text.
 * Includes ReDoS (catastrophic backtracking) detection.
 * NO external libraries. NO network calls.
 *
 * Input format (two blocks separated by ---):
 *
 *   /pattern/flags
 *   ---
 *   test string
 *   another line
 *
 * Or just paste a pattern on line 1, then ---, then test strings.
 */

const meta = {
  id: "regex",
  label: "Regex Tester",
  phase: 3,
  group: "Text",
  placeholder: `/([A-Z][a-z]+)\\s(\\w+)/g
---
Hello World
foo bar
Jane Smith`,
  description: "Test regexes against input text. Flags, capture groups, and ReDoS detection included.",
};

// Hard timeout for match execution (ms)
const MATCH_TIMEOUT_MS = 2_000;

/**
 * @param {string} input
 * @returns {{ success: boolean, output: string, error: string, matches: object[]|null }}
 */
function run(input) {
  if (typeof input !== "string") {
    return { success: false, output: "", error: "Input must be a string.", matches: null };
  }

  const trimmed = input.trim();
  if (trimmed === "") {
    return { success: false, output: "", error: "Input is empty.", matches: null };
  }

  // Split on divider
  const lines  = trimmed.split("\n");
  const divIdx = lines.findIndex((l) => /^-{3,}$/.test(l.trim()));
  if (divIdx === -1) {
    return {
      success: false,
      output: "",
      error: 'Separate your pattern from test strings with "---" on its own line.',
      matches: null,
    };
  }

  const patternLine = lines.slice(0, divIdx).join("\n").trim();
  const testText    = lines.slice(divIdx + 1).join("\n");

  // Parse pattern: /pattern/flags  OR  bare pattern
  let pattern, flags;
  const slashMatch = patternLine.match(/^\/(.+)\/([gimsuy]*)$/s);
  if (slashMatch) {
    [, pattern, flags] = slashMatch;
  } else {
    pattern = patternLine;
    flags   = "g";
  }

  // ReDoS pre-check
  const redosWarning = detectReDoS(pattern);

  let regex;
  try {
    regex = new RegExp(pattern, flags);
  } catch (e) {
    return { success: false, output: "", error: `Invalid regex: ${e.message}`, matches: null };
  }

  // Execute with a watchdog timer via synchronous date-based check
  const matches = safeMatch(regex, testText, pattern, flags);
  if (matches === null) {
    return {
      success: false,
      output: "",
      error: `Regex execution exceeded ${MATCH_TIMEOUT_MS}ms — possible catastrophic backtracking. Simplify the pattern.`,
      matches: null,
    };
  }

  const output = buildOutput(pattern, flags, testText, matches, redosWarning);
  return { success: true, output, error: "", matches };
}

/* ── ReDoS Detector ──────────────────────────────────────────────────────── */

/**
 * Heuristic detector for common ReDoS patterns.
 * Checks for nested quantifiers and polynomial-time patterns.
 * Returns a warning string or null.
 */
function detectReDoS(pattern) {
  const warnings = [];

  // Pattern: (a+)+ or (a*)* or (.+)+ etc. — exponential backtracking
  if (/\([^)]*[*+]\)[*+]/.test(pattern)) {
    warnings.push("Nested quantifiers detected e.g. (a+)+ — high ReDoS risk.");
  }

  // Pattern: (a|a)* — alternation with overlap
  if (/\([^)]*\|[^)]*\)[*+]/.test(pattern)) {
    warnings.push("Alternation with quantifier detected — potential polynomial backtracking.");
  }

  // Catastrophically long character classes with quantifiers
  if (/\[[^\]]{20,}\][*+{]/.test(pattern)) {
    warnings.push("Large character class with unbounded quantifier — may be slow on long inputs.");
  }

  // Backtracking-prone: .* followed by literal that may appear earlier
  if (/\.\*[^*+?)]{3,}/.test(pattern)) {
    warnings.push("Greedy .* followed by literal — can cause excessive backtracking on non-matching input.");
  }

  return warnings.length > 0 ? warnings.join(" ") : null;
}

/* ── Safe match execution ────────────────────────────────────────────────── */

function safeMatch(regex, text, pattern, flags) {
  const deadline = Date.now() + MATCH_TIMEOUT_MS;
  const results  = [];
  const isGlobal = regex.global || regex.sticky;

  if (!isGlobal) {
    // Single match — just check deadline after
    const m = regex.exec(text);
    if (Date.now() > deadline) return null;
    if (m) results.push(formatMatch(m));
    return results;
  }

  // Global / sticky — iterate matches one by one, checking deadline each iteration
  let m;
  let lastIndex = -1;
  regex.lastIndex = 0;

  while ((m = regex.exec(text)) !== null) {
    if (Date.now() > deadline) return null;

    // Guard against zero-width match infinite loops
    if (regex.lastIndex === lastIndex) {
      regex.lastIndex++;
      continue;
    }
    lastIndex = regex.lastIndex;

    results.push(formatMatch(m));

    if (results.length > 1000) {
      results.push({ value: "… (truncated at 1000 matches)", index: -1, groups: null });
      break;
    }
  }

  return results;
}

function formatMatch(m) {
  return {
    value:    m[0],
    index:    m.index,
    groups:   m.slice(1),
    named:    m.groups ?? null,
  };
}

/* ── Output builder ──────────────────────────────────────────────────────── */

function buildOutput(pattern, flags, text, matches, redosWarning) {
  const lines = [];

  if (redosWarning) {
    lines.push(`⚠  ReDoS Warning: ${redosWarning}`, "");
  }

  lines.push(
    `Pattern:  /${pattern}/${flags}`,
    `Matches:  ${matches.length}`,
    ""
  );

  if (matches.length === 0) {
    lines.push("✖  No matches found.");
    return lines.join("\n");
  }

  lines.push("── MATCHES ────────────────────────────────────────");

  matches.forEach((m, i) => {
    if (m.index === -1) { lines.push(`  ${m.value}`); return; }

    const preview = m.value.length > 60 ? m.value.slice(0, 57) + "…" : m.value;
    const lineNum  = text.slice(0, m.index).split("\n").length;

    lines.push(`  ${String(i + 1).padStart(3)}. [line ${lineNum}, pos ${m.index}]  ${JSON.stringify(preview)}`);

    if (m.groups.length > 0 && m.groups.some((g) => g !== undefined)) {
      m.groups.forEach((g, gi) => {
        if (g !== undefined) lines.push(`        Group ${gi + 1}: ${JSON.stringify(g)}`);
      });
    }

    if (m.named) {
      Object.entries(m.named).forEach(([k, v]) => {
        if (v !== undefined) lines.push(`        Named (${k}): ${JSON.stringify(v)}`);
      });
    }
  });

  return lines.join("\n");
}

  return { meta: meta, run: run };
})();

document.addEventListener("DOMContentLoaded", () => {

  dom = {
    sidebar:       document.getElementById("sidebar-nav"),
    toolTitle:     document.getElementById("tool-title"),
    sensitiveBtn:  document.getElementById("btn-sensitive"),
    sensitiveTimer:document.getElementById("sensitive-timer"),
    clearBtn:      document.getElementById("btn-clear"),

  };

  sensitive = new SensitiveMode({

      dom.input.value = "";

      setTimeout(() => dom.input.removeAttribute("data-sensitive-cleared"), 2000);
    },

      if (secondsLeft === null) {
        dom.sensitiveTimer.textContent = "";

      } else {
        dom.sensitiveTimer.textContent = "Auto-clear in " + secondsLeft + "s";
        dom.sensitiveTimer.hidden = false;
      }
    },
  });

  buildSidebar();
  switchTool(TOOL_ORDER[0]);

  dom.input.addEventListener("input", onInputChange);
  dom.input.addEventListener("input", updateInputGutter);
  dom.input.addEventListener("scroll", syncInputGutter);
  dom.outputArea.addEventListener("scroll", syncOutputGutter);
  dom.runBtn.addEventListener("click", runActiveTool);
  dom.clearBtn.addEventListener("click", () => sensitive.clearNow());
  dom.sensitiveBtn.addEventListener("click", toggleSensitiveMode);
  dom.btnTheme.addEventListener("click", toggleTheme);
  dom.btnCopy.addEventListener("click", copyOutput);

      e.preventDefault();

  });

/* ── Sidebar ────────────────────────────────────────────────────────────── */
function buildSidebar() {
  const groups = getGrouped();
  dom.sidebar.innerHTML = "";
  groups.forEach(({ group, items }) => {
    const heading = document.createElement("div");
    heading.className = "sidebar-group";
    heading.textContent = group;
    dom.sidebar.appendChild(heading);
    items.forEach((meta) => {
      const btn = document.createElement("button");
      btn.className = "sidebar-item";
      btn.dataset.toolId = meta.id;
      btn.textContent = meta.label;
      btn.addEventListener("click", () => switchTool(meta.id));
      dom.sidebar.appendChild(btn);
    });
  });
}

/* ── Tool Switching ─────────────────────────────────────────────────────── */
function switchTool(id) {
  if (activeTool && activeTool.meta.id === id) return;
  sensitive.onToolSwitch();
  activeTool = TOOLS.get(id);
  if (!activeTool) return;

  dom.sidebar.querySelectorAll(".sidebar-item").forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.toolId === id);
  });
  dom.toolTitle.textContent = activeTool.meta.label;
  dom.input.placeholder = activeTool.meta.placeholder || "";
  dom.input.value = "";
  updateInputGutter();
  clearOutput();

  if (id === "uuid") {
    runActiveTool();
  } else if (id === "timestamp") {
    dom.input.value = "now";
    runActiveTool();
  }
}

/* ── Run Tool ───────────────────────────────────────────────────────────── */
function runActiveTool() {
  if (!activeTool) return;
  let result;
  try {
    result = activeTool.run(dom.input.value);
  } catch (e) {
    result = { success: false, output: "", error: "Unexpected error: " + e.message };
  }
  renderResult(result);
}

function onInputChange() {
  sensitive.activity();
  const liveTools = ["json-validator", "yaml-linter", "xml-formatter"];
  if (activeTool && liveTools.includes(activeTool.meta.id) && dom.input.value.trim() !== "") {
    runActiveTool();
  }
}

/* ── Line Gutter Helpers ────────────────────────────────────────────────── */

function buildGutterLines(text, errorLineSet) {
  const lines = (text || "").split("\n");
  // always at least 1 line
  const count = Math.max(1, lines.length);
  const frag = document.createDocumentFragment();
  for (let i = 1; i <= count; i++) {
    const s = document.createElement("span");
    s.textContent = i;
    if (errorLineSet && errorLineSet.has(i)) s.className = "line-error";
    frag.appendChild(s);
  }
  return frag;
}

function setGutter(gutter, text, errorLineSet) {
  gutter.innerHTML = "";
  gutter.appendChild(buildGutterLines(text, errorLineSet));
}

function updateInputGutter() {
  setGutter(dom.inputGutter, dom.input.value);
}

/** Scroll the gutter vertically in sync with the textarea */
function syncInputGutter() {
  dom.inputGutter.scrollTop = dom.input.scrollTop;
}

/** Scroll the output gutter in sync with the output pre */
function syncOutputGutter() {
  dom.outputGutter.scrollTop = dom.outputArea.scrollTop;
}

/**
 * Parse a line number out of an error string.
 * Handles: "line 20", ":20:", "[20,5]", "(20,5)"
 */
function errorLineSet(msg) {
  if (!msg) return null;
  const patterns = [/\bline[:\s]+(\d+)/i, /:(\d+):\d+/, /\[(\d+),\s*\d+\]/, /\((\d+),\s*\d+\)/];
  for (const p of patterns) {
    const m = msg.match(p);
    if (m) return new Set([parseInt(m[1], 10)]);
  }
  return null;
}

/* ── Output Rendering ───────────────────────────────────────────────────── */
function renderResult(result) {
  dom.outputEmpty.hidden     = true;
  dom.outputContainer.hidden = false;
  dom.outputArea.scrollTop   = 0;

  if (result.success) {
    dom.outputArea.className = "success";

    if (activeTool && activeTool.meta.id === "text-diff" && result.stats) {
      dom.outputArea.innerHTML = colorizeDiff(result.output);
      dom.outputStats.hidden = false;
      dom.outputStats.innerHTML =
        '<span class="stat-add">+' + result.stats.added + ' added</span>' +
        '<span class="stat-rem">-' + result.stats.removed + ' removed</span>' +
        '<span>' + result.stats.unchanged + ' unchanged</span>';
      dom.modeHint.hidden = true;
      setGutter(dom.outputGutter, result.output);
      return;
    }

    dom.outputArea.textContent = result.output;
    setGutter(dom.outputGutter, result.output);

    if (result.stats) {
      dom.outputStats.hidden = false;
      const s = result.stats;
      if (s.elements !== undefined) {
        dom.outputStats.innerHTML =
          '<span>' + s.elements + ' elements</span>' +
          '<span>' + s.attributes + ' attrs</span>' +
          '<span>' + s.textNodes + ' text nodes</span>' +
          '<span>depth ' + s.maxDepth + '</span>';
      } else {
        dom.outputStats.innerHTML =
          '<span>' + s.keys + ' keys</span>' +
          '<span>' + s.objects + ' objects</span>' +
          '<span>' + s.arrays + ' arrays</span>' +
          '<span>depth ' + s.maxDepth + '</span>';
      }
    } else {
      dom.outputStats.hidden = true;
    }

    if (activeTool && activeTool.meta.id === "jwt" && result.data && result.data.expiry) {
      const { status, label } = result.data.expiry;
      dom.modeHint.textContent = status === "expired" ? ("✖ " + label) : status === "valid" ? "✔ Valid" : "– No exp";
      dom.modeHint.className   = status === "expired" ? "mode-hint-error" : "mode-hint-ok";
      dom.modeHint.hidden = false;
    } else if (result.mode) {
      dom.modeHint.textContent = result.mode === "encode" ? "⬆ Encoded" : "⬇ Decoded";
      dom.modeHint.className   = "";
      dom.modeHint.hidden = false;
    } else {
      dom.modeHint.hidden = true;
    }

  } else {
    const errMsg = result.error || "An error occurred.";
    dom.outputArea.className   = "error";
    dom.outputArea.textContent = errMsg;
    dom.outputStats.hidden     = true;
    dom.modeHint.hidden        = true;
    setGutter(dom.outputGutter, errMsg);
    /* highlight the bad line in the INPUT gutter too */
    setGutter(dom.inputGutter, dom.input.value, errorLineSet(errMsg));
  }
}

function clearOutput() {
  dom.outputContainer.hidden = true;
  dom.outputArea.textContent = "";
  dom.outputArea.innerHTML   = "";
  dom.outputStats.hidden     = true;
  dom.outputEmpty.hidden     = false;
  dom.modeHint.hidden        = true;
  setGutter(dom.outputGutter, "");
}

function colorizeDiff(text) {
  return text.split("\n").map(function(line) {
    var esc = line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    if (line.startsWith("+")) return '<span class="diff-add">' + esc + '</span>';
    if (line.startsWith("-")) return '<span class="diff-rem">' + esc + '</span>';
    return '<span class="diff-eq">' + esc + '</span>';
  }).join("\n");
}

/* ── Sensitive Mode Toggle ──────────────────────────────────────────────── */
function toggleSensitiveMode() {
  const enabled = sensitive.toggle();
  dom.sensitiveBtn.classList.toggle("active", enabled);
  dom.sensitiveBtn.querySelector(".sm-label").textContent = "Sensitive Mode: " + (enabled ? "ON" : "OFF");
  if (!enabled) {
    dom.sensitiveTimer.hidden = true;
    dom.sensitiveTimer.textContent = "";
  }
}

/* ── Theme Toggle ───────────────────────────────────────────────────────── */
function toggleTheme() {
  document.body.classList.toggle("light-mode");
  const isLight = document.body.classList.contains("light-mode");
  dom.btnTheme.textContent = isLight ? "Dark Mode" : "Light Mode";
}

/* ── Copy Output ────────────────────────────────────────────────────────── */
function copyOutput() {
  if (dom.outputArea.textContent.trim() === "") return;
  navigator.clipboard.writeText(dom.outputArea.textContent).then(() => {
    const original = dom.btnCopy.textContent;
    dom.btnCopy.textContent = "Copied!";
    setTimeout(() => dom.btnCopy.textContent = original, 1000);
  }).catch(err => {
    console.error("Copy failed", err);
  });
}

</script>
